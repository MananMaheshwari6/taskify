<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Todo List Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="Taskify - A simple and elegant todo list application to manage your tasks.">
</head>
<body>
    <div class="container">
        <header>
            <h1>Taskify</h1>
            <div class="header-controls">
                <div id="user-info" class="hidden">
                    <span id="username-display"></span>
                    <button id="logout-btn">Logout</button>
                </div>
                <div class="theme-switch">
                    <label class="theme-switch-toggle">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                <div class="theme-icons">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
    </div>
</header>

        <!-- Auth Forms -->
        <div id="auth-section">
            <div id="login-form" class="auth-form">
                <h2>Welcome Back</h2>
                <form id="login">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
                <div id="login-error" class="error-message"></div>
            </div>

            <div id="signup-form" class="auth-form hidden">
                <h2>Create Account</h2>
                <form id="signup">
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                    </div>
                    <button type="submit">Sign Up</button>
                </form>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
                <div id="signup-error" class="error-message"></div>
            </div>
        </div>

        <!-- Todo Section -->
        <div id="todo-section" class="hidden">
            <div class="todo-header">
                <h2>My Tasks</h2>
            </div>
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="What needs to be done?" required>
                <button type="submit">Add Task</button>
            </form>
            <ul id="todo-list"></ul>
            <div id="todo-error" class="error-message"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
